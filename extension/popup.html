<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 280px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 13px;
  color: #1a1a1b;
  background: #fff;
}
@media (prefers-color-scheme: dark) {
  body { background: #1a1a1b; color: #d7dadc; }
  .header { border-bottom-color: #343536; }
  .stat-value { color: #d7dadc; }
  .footer { border-top-color: #343536; }
  .footer a { color: #4fbcff; }
}
.header {
  padding: 14px 16px;
  border-bottom: 1px solid #edeff1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-icon { font-size: 20px; }
.header-title { font-weight: 700; font-size: 14px; }
.stats {
  padding: 16px;
  display: flex;
  gap: 12px;
}
.stat {
  flex: 1;
  text-align: center;
  padding: 10px 8px;
  border-radius: 8px;
  background: #f6f7f8;
}
@media (prefers-color-scheme: dark) {
  .stat { background: #272729; }
}
.stat-value {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.2;
}
.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  opacity: 0.6;
  margin-top: 2px;
}
.stat-ghost .stat-value { color: #cf222e; }
.stat-live .stat-value { color: #1a7f37; }
.message {
  padding: 0 16px 14px;
  font-size: 12px;
  opacity: 0.7;
  line-height: 1.5;
}
.footer {
  padding: 10px 16px;
  border-top: 1px solid #edeff1;
  font-size: 11px;
  text-align: center;
}
.footer a {
  color: #0079d3;
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="header">
    <span class="header-icon">&#x1F47B;</span>
    <span class="header-title">PostGhost</span>
  </div>
  <div class="stats">
    <div class="stat stat-ghost">
      <div class="stat-value" id="ghost-count">&mdash;</div>
      <div class="stat-label">Ghost</div>
    </div>
    <div class="stat stat-live">
      <div class="stat-value" id="live-count">&mdash;</div>
      <div class="stat-label">Live</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="total-count">&mdash;</div>
      <div class="stat-label">Total</div>
    </div>
  </div>
  <div class="message" id="message">Visit your Reddit profile to scan posts.</div>
  <div class="footer">
    <a href="https://github.com/LeonTing1010/postghost" target="_blank">GitHub</a>
    &nbsp;&middot;&nbsp;
    <a href="https://github.com/LeonTing1010/postghost/issues" target="_blank">Report Issue</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
